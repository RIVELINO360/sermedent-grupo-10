<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citas - SERMEDENT</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="container">

    <aside class="sidebar">
        <div class="logo">
            <h2>SERMEDENT</h2>
            <p>Clínica Médica y Dental</p>
        </div>
        <nav class="menu">
            <ul>
                <li><a href="index.html">Panel Principal</a></li>
                <li class="active"><a href="citas.html">Citas</a></li>
                <li><a href="pacientes.html">Pacientes</a></li>
                <li><a href="historial.html">Historial Clínico</a></li>
                <li><a href="inventario.html">Inventario</a></li>
                <li><a href="usuarios.html">Usuarios</a></li>
                <li><a href="#">Configuración</a></li>
            </ul>
        </nav>
        <div class="user-panel">
            <p id="nombreUsuario">-</p>
            <span id="rolUsuario">-</span>
            <br><a href="login.html" id="btnLogout" style="color:#ccc;font-size:12px;text-decoration:none;">Cerrar sesión</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div>
                <h1>Citas</h1>
                <p>Gestión de citas de la clínica</p>
            </div>
            <div style="display:flex;gap:10px;align-items:center;">
                <input type="date" id="filtroFecha" />
                <button class="btn-cita" id="btnLimpiar">Todas</button>
            </div>
        </header>

        <div class="panel" style="margin-top:20px;">
            <div class="panel-header">
                <h2>Lista de Citas</h2>
                <button class="btn-cita" id="btnNuevaCita">+ Nueva cita</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Paciente</th>
                        <th>Servicio</th>
                        <th>Médico</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaCitas">
                    <tr><td colspan="7" style="text-align:center;color:#999;">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<button class="floating-btn" id="btnFlotante">+</button>

<!-- Modal nueva cita -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Nueva Cita</h2>
        <form id="formCita">
            <div class="toggle-paciente">
                <button type="button" class="tab-btn active" id="tabExistente">Paciente existente</button>
                <button type="button" class="tab-btn" id="tabNuevo">Paciente nuevo</button>
            </div>
            <div id="panelExistente">
                <select id="selectPaciente">
                    <option value="">-- Seleccionar Paciente --</option>
                </select>
            </div>
            <div id="panelNuevo" style="display:none;">
                <input type="text" id="nuevoDni" placeholder="DNI *" />
                <input type="text" id="nuevoNombres" placeholder="Nombres *" />
                <input type="text" id="nuevoApellidos" placeholder="Apellidos *" />
                <input type="text" id="nuevoTelefono" placeholder="Teléfono (opcional)" />
            </div>
            <select id="selectServicio" required>
                <option value="">-- Seleccionar Servicio --</option>
            </select>
            <select id="selectMedico" required>
                <option value="">-- Seleccionar Médico --</option>
            </select>
            <input type="date" id="fechaCita" required />
            <input type="time" id="horaCita" required />
            <p id="mensajeCita" style="font-size:13px;margin-top:5px;"></p>
            <button type="submit">Guardar</button>
        </form>
    </div>
</div>

<script src="js/citas.js"></script>
</body>
</html>
