<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuarios - SERMEDENT</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="container">

    <aside class="sidebar">
        <div class="logo">
            <h2>SERMEDENT</h2>
            <p>Clínica Médica y Dental</p>
        </div>
        <nav class="menu">
            <ul>
                <li><a href="index.html">Panel Principal</a></li>
                <li><a href="citas.html">Citas</a></li>
                <li><a href="pacientes.html">Pacientes</a></li>
                <li><a href="historial.html">Historial Clínico</a></li>
                <li><a href="inventario.html">Inventario</a></li>
                <li class="active"><a href="usuarios.html">Usuarios</a></li>
                <li><a href="#">Configuración</a></li>
            </ul>
        </nav>
        <div class="user-panel">
            <p id="nombreUsuario">-</p>
            <span id="rolUsuario">-</span>
            <br><a href="login.html" id="btnLogout" style="color:#ccc;font-size:12px;text-decoration:none;">Cerrar sesión</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div>
                <h1>Usuarios</h1>
                <p>Gestión del personal del sistema</p>
            </div>
            <button class="btn-cita" id="btnNuevoUsuario">+ Nuevo usuario</button>
        </header>

        <div class="panel" style="margin-top:20px;">
            <div class="panel-header">
                <h2>Lista de Usuarios</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaUsuarios">
                    <tr><td colspan="5" style="text-align:center;color:#999;">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<button class="floating-btn" id="btnFlotante">+</button>

<!-- Modal nuevo usuario -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Nuevo Usuario</h2>
        <form id="formUsuario">
            <input type="text" id="nuevoUsuario" placeholder="Nombre de usuario *" required />
            <input type="email" id="nuevoEmail" placeholder="Email *" required />
            <input type="password" id="nuevoPassword" placeholder="Contraseña *" required />
            <select id="nuevoRol" required>
                <option value="">Seleccionar rol</option>
                <option value="administrador">Administrador</option>
                <option value="médico">Médico</option>
                <option value="recepcionista">Recepcionista</option>
            </select>
            <p id="mensajeUsuario" style="font-size:13px;margin-top:5px;"></p>
            <button type="submit">Registrar</button>
        </form>
    </div>
</div>

<script src="js/usuarios.js"></script>
</body>
</html>
